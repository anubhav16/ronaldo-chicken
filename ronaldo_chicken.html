
<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#1a1a2e;overflow:hidden;font-family:'Nunito',sans-serif}
  #game{position:relative;width:100%;height:520px;overflow:hidden;background:linear-gradient(180deg,#0f3460 0%,#16213e 60%,#1a472a 60%,#2d6a4f 100%)}
  /* Stars */
  .star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 2s infinite alternate}
  @keyframes twinkle{0%{opacity:.3}100%{opacity:1}}
  /* Ground markings */
  #field{position:absolute;bottom:0;width:100%;height:208px}
  .line{position:absolute;background:rgba(255,255,255,0.15);height:2px}
  /* Characters */
  .char{position:absolute;bottom:208px;font-size:48px;transition:left 0.05s linear;user-select:none}
  #ronaldo{left:80px;z-index:10;filter:drop-shadow(0 4px 8px rgba(255,200,0,0.8))}
  #mbappe{left:140px;z-index:9;filter:drop-shadow(0 4px 8px rgba(0,120,255,0.8))}
  /* Jump */
  .jumping{animation:jump 0.5s ease-out}
  @keyframes jump{0%{bottom:208px}40%{bottom:290px}100%{bottom:208px}}
  /* Chickens */
  .chicken{position:absolute;bottom:208px;font-size:32px;z-index:8;transition:opacity 0.3s}
  .chicken.hidden{opacity:0}
  .chicken.revealed{animation:chickenReveal 0.3s ease-out;opacity:1}
  @keyframes chickenReveal{0%{transform:scale(0) rotate(-20deg)}100%{transform:scale(1) rotate(0deg)}}
  .chicken.caught{animation:chickenCaught 0.4s ease-in forwards}
  @keyframes chickenCaught{0%{transform:scale(1)}50%{transform:scale(1.5)}100%{transform:scale(0) translateY(-60px);opacity:0}}
  /* Bush hiding spots */
  .bush{position:absolute;bottom:208px;font-size:40px;z-index:7}
  /* Score / UI */
  #ui{position:absolute;top:0;left:0;right:0;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;z-index:20}
  #score-box{background:rgba(255,215,0,0.15);border:2px solid gold;border-radius:12px;padding:6px 16px;color:gold;font-family:'Bangers',cursive;font-size:22px;letter-spacing:1px}
  #timer-box{background:rgba(255,80,80,0.15);border:2px solid #ff5050;border-radius:12px;padding:6px 16px;color:#ff8080;font-family:'Bangers',cursive;font-size:22px}
  #title-box{font-family:'Bangers',cursive;font-size:20px;color:#fff;letter-spacing:2px;text-shadow:0 0 10px gold}
  /* Mbappe speech bubble */
  #bubble{position:absolute;background:#fff;border-radius:12px;padding:5px 10px;font-size:12px;font-weight:700;color:#333;z-index:30;pointer-events:none;transition:opacity 0.2s;white-space:nowrap}
  #bubble::after{content:'';position:absolute;bottom:-8px;left:12px;border:8px solid transparent;border-top-color:#fff;border-bottom:0}
  /* Controls hint */
  #hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.5);font-size:11px;z-index:20}
  /* Start / End screens */
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;background:rgba(10,10,30,0.88)}
  .screen h1{font-family:'Bangers',cursive;font-size:52px;color:gold;letter-spacing:3px;text-shadow:0 0 20px gold;margin-bottom:8px}
  .screen p{color:#ccc;font-size:14px;text-align:center;max-width:300px;margin-bottom:24px}
  .btn{background:gold;color:#1a1a2e;font-family:'Bangers',cursive;font-size:22px;letter-spacing:2px;border:none;padding:12px 36px;border-radius:40px;cursor:pointer;transition:transform 0.1s}
  .btn:hover{transform:scale(1.06)}
  .btn:active{transform:scale(0.97)}
  #final-score{font-family:'Bangers',cursive;font-size:36px;color:#fff;margin-bottom:16px}
  /* Particles */
  .particle{position:absolute;pointer-events:none;font-size:22px;animation:floatUp 0.8s ease-out forwards;z-index:25}
  @keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-80px) scale(0.5);opacity:0}}
  /* Running animation */
  @keyframes bobRonaldo{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-4px) rotate(2deg)}}
  @keyframes bobMbappe{0%,100%{transform:translateY(0) rotate(2deg)}50%{transform:translateY(-6px) rotate(-2deg)}}
  #ronaldo.running{animation:bobRonaldo 0.2s infinite}
  #mbappe.running{animation:bobMbappe 0.15s infinite}
</style>
</head>
<body>
<div id="game">
  <!-- Stars -->
  <div id="stars"></div>

  <!-- Ground field -->
  <div id="field">
    <div class="line" style="top:0;left:0;right:0"></div>
    <div class="line" style="top:40px;left:10%;right:10%"></div>
  </div>

  <!-- UI -->
  <div id="ui">
    <div id="score-box">🍗 <span id="score">0</span></div>
    <div id="title-box">RONALDO CHICKEN GAME</div>
    <div id="timer-box">⏱ <span id="timer">30</span>s</div>
  </div>

  <!-- Characters -->
  <div id="ronaldo" class="char">🏃</div>
  <div id="mbappe" class="char" style="font-size:40px">🏃‍♂️</div>

  <!-- Mbappe bubble -->
  <div id="bubble" style="opacity:0">Oi! Chicken here!</div>

  <!-- Hint -->
  <div id="hint">TAP / SPACE = Jump &nbsp;|&nbsp; ← → = Run</div>

  <!-- Start Screen -->
  <div class="screen" id="start-screen">
    <div style="font-size:64px;margin-bottom:8px">🐔</div>
    <h1>RONALDO<br>CHICKEN GAME</h1>
    <p>Mbappe finds chickens hiding in the bushes.<br>Run to them and jump to catch! 🍗</p>
    <button class="btn" onclick="startGame()">SIUUU! LET'S GO 🚀</button>
  </div>

  <!-- End Screen -->
  <div class="screen" id="end-screen" style="display:none">
    <div style="font-size:56px">🏆</div>
    <h1>FULL TIME!</h1>
    <div id="final-score">You caught 0 chickens!</div>
    <p id="end-msg">Mbappe is proud of you!</p>
    <button class="btn" onclick="startGame()" style="margin-top:12px">PLAY AGAIN</button>
  </div>
</div>

<script>
// Stars
const starsEl = document.getElementById('stars');
for(let i=0;i<40;i++){
  const s=document.createElement('div');
  s.className='star';
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*55}%;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;animation-delay:${Math.random()*2}s`;
  starsEl.appendChild(s);
}

const game=document.getElementById('game');
const ronaldoEl=document.getElementById('ronaldo');
const mbappeEl=document.getElementById('mbappe');
const bubbleEl=document.getElementById('bubble');
const scoreEl=document.getElementById('score');
const timerEl=document.getElementById('timer');

let score=0, timeLeft=30, gameRunning=false;
let ronX=80, mbappeX=140;
let jumping=false, onGround=true;
let ronVelX=0;
let chickens=[], bushes=[];
let gameLoop, timerInterval;
let bubbleTimeout;

const GROUND=208, GAME_W=680;

// Emoji characters
const RONALDO_EMOJI='⚽';
const bushEmojis=['🌳','🌲','🌿','🪴'];
const chickenEmojis=['🐔','🐓'];

function randInt(a,b){return Math.floor(Math.random()*(b-a))+a;}

function createBush(x){
  const el=document.createElement('div');
  el.className='bush';
  el.style.left=x+'px';
  el.textContent=bushEmojis[randInt(0,bushEmojis.length)];
  el.style.fontSize=(44+randInt(0,16))+'px';
  game.appendChild(el);
  return {el,x,hasChicken:false,chickenEl:null,revealed:false};
}

function createChicken(bush){
  const el=document.createElement('div');
  el.className='chicken hidden';
  el.style.left=(bush.x-4)+'px';
  el.textContent=chickenEmojis[randInt(0,2)];
  game.appendChild(el);
  bush.hasChicken=true;
  bush.chickenEl=el;
  bush.revealed=false;
  return el;
}

function spawnBushes(){
  // Clear old
  bushes.forEach(b=>{b.el.remove();if(b.chickenEl)b.chickenEl.remove();});
  chickens=[];bushes=[];
  const positions=[180,260,340,420,510,590];
  positions.forEach(x=>{
    const b=createBush(x);
    if(Math.random()<0.55) createChicken(b);
    bushes.push(b);
  });
}

function revealNearbyChickens(){
  // Mbappe reveals chickens within 90px
  bushes.forEach(b=>{
    if(!b.hasChicken||b.revealed) return;
    const dist=Math.abs(mbappeX-b.x);
    if(dist<90){
      b.revealed=true;
      b.chickenEl.classList.remove('hidden');
      b.chickenEl.classList.add('revealed');
      showBubble('Chicken here! 🐔', mbappeX);
    }
  });
}

function catchNearbyChickens(){
  bushes.forEach(b=>{
    if(!b.hasChicken||!b.revealed||b.caught) return;
    const dist=Math.abs(ronX-b.x);
    if(dist<48){
      b.caught=true;
      b.chickenEl.classList.add('caught');
      score++;
      scoreEl.textContent=score;
      spawnParticle(ronX,'🍗');
      spawnParticle(ronX+20,'⭐');
      // Respawn a new chicken elsewhere after delay
      setTimeout(()=>{
        if(!gameRunning) return;
        b.chickenEl.remove();
        b.hasChicken=false;
        b.chickenEl=null;
        b.caught=false;
        b.revealed=false;
        if(Math.random()<0.7) createChicken(b);
      },1200);
    }
  });
}

function showBubble(text, x){
  clearTimeout(bubbleTimeout);
  bubbleEl.textContent=text;
  bubbleEl.style.left=Math.min(Math.max(x-10,4),game.offsetWidth-140)+'px';
  bubbleEl.style.bottom=(GROUND+52)+'px';
  bubbleEl.style.opacity='1';
  bubbleTimeout=setTimeout(()=>bubbleEl.style.opacity='0',1200);
}

function spawnParticle(x,emoji){
  const p=document.createElement('div');
  p.className='particle';
  p.textContent=emoji;
  p.style.left=x+'px';
  p.style.bottom=(GROUND+20)+'px';
  game.appendChild(p);
  setTimeout(()=>p.remove(),900);
}

// Input
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if((e.key===' '||e.key==='ArrowUp')&&onGround&&gameRunning) doJump();
});
document.addEventListener('keyup',e=>keys[e.key]=false);
// Touch
game.addEventListener('touchstart',e=>{
  e.preventDefault();
  const tx=e.touches[0].clientX;
  const gw=game.offsetWidth;
  if(tx<gw*0.35) keys['ArrowLeft']=true;
  else if(tx>gw*0.65) keys['ArrowRight']=true;
  else if(onGround&&gameRunning) doJump();
},{passive:false});
game.addEventListener('touchend',e=>{
  keys['ArrowLeft']=false;keys['ArrowRight']=false;
});

let ronBottom=GROUND;
let ronVelY=0;

function doJump(){
  if(!onGround) return;
  onGround=false;
  jumping=true;
  ronVelY=14;
  ronaldoEl.classList.add('jumping');
  setTimeout(()=>ronaldoEl.classList.remove('jumping'),500);
}

function updatePhysics(){
  // Horizontal movement
  if(keys['ArrowLeft']||keys['a']) ronVelX=-3.5;
  else if(keys['ArrowRight']||keys['d']) ronVelX=3.5;
  else ronVelX*=0.8;

  ronX=Math.max(20, Math.min(ronX+ronVelX, GAME_W-60));

  // Mbappe follows with slight lag, slightly ahead of Ronaldo
  const targetMbappe=ronX+60+Math.sin(Date.now()/400)*20;
  mbappeX+=(targetMbappe-mbappeX)*0.07;

  // Jump physics
  if(!onGround){
    ronBottom+=ronVelY;
    ronVelY-=1.2;
    if(ronBottom<=GROUND){ronBottom=GROUND;onGround=true;jumping=false;ronVelY=0;}
  }

  // Apply positions
  const gameW=game.offsetWidth||680;
  const scaleX=gameW/680;
  ronaldoEl.style.left=(ronX*scaleX)+'px';
  mbappeEl.style.left=(mbappeX*scaleX)+'px';
  ronaldoEl.style.bottom=ronBottom+'px';

  // Running animation
  if(Math.abs(ronVelX)>0.5){ronaldoEl.classList.add('running');}
  else{ronaldoEl.classList.remove('running');}
  mbappeEl.classList.add('running');

  revealNearbyChickens();
  catchNearbyChickens();
}

function startGame(){
  document.getElementById('start-screen').style.display='none';
  document.getElementById('end-screen').style.display='none';
  score=0;timeLeft=30;
  scoreEl.textContent=0;
  timerEl.textContent=30;
  ronX=80;mbappeX=140;ronBottom=GROUND;ronVelY=0;onGround=true;
  gameRunning=true;
  spawnBushes();
  clearInterval(gameLoop);clearInterval(timerInterval);
  gameLoop=setInterval(updatePhysics,16);
  timerInterval=setInterval(()=>{
    timeLeft--;
    timerEl.textContent=timeLeft;
    // Respawn bushes midway
    if(timeLeft===15) spawnBushes();
    if(timeLeft<=0){
      clearInterval(gameLoop);clearInterval(timerInterval);
      gameRunning=false;
      endGame();
    }
  },1000);
}

function endGame(){
  document.getElementById('final-score').textContent=`You caught ${score} chicken${score!==1?'s':''}! 🍗`;
  const msgs=score>=10?'SIUUUU! Ronaldo is a champion!':score>=5?'Mbappe is proud of you! 💙':score>=2?'Good run! Try again!':'The chickens were too sneaky! 🐔';
  document.getElementById('end-msg').textContent=msgs;
  document.getElementById('end-screen').style.display='flex';
}
</script>
</body>
</html>
